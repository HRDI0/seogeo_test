services:
  - type: web
    name: seogeo-api
    runtime: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.seogeo_reporter.runner
    envVars:
      - key: APP_ENV
        value: production
      - key: TOKEN_STORE_MODE
        value: encrypted
      - key: TOKEN_ENC_KEY
        sync: false
      - key: TOKEN_MAC_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

  - type: worker
    name: seogeo-worker
    runtime: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.seogeo_reporter.runner
    envVars:
      - key: APP_ENV
        value: production
      - key: TOKEN_STORE_MODE
        value: encrypted
      - key: TOKEN_ENC_KEY
        sync: false
      - key: TOKEN_MAC_KEY
        sync: false

  - type: cron
    name: seogeo-monthly-cron
    runtime: python
    schedule: "0 2 1 * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.seogeo_reporter.runner
    envVars:
      - key: APP_ENV
        value: production
      - key: TOKEN_STORE_MODE
        value: encrypted
      - key: TOKEN_ENC_KEY
        sync: false
      - key: TOKEN_MAC_KEY
        sync: false
